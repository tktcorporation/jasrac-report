name: Test

on:
  push:

jobs:
  test-vitest:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: npm i -g @antfu/ni

      - name: Install dependencies
        run: nci

      - name: Test
        run: nr test
