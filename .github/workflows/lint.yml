name: Lint

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: npm i -g @antfu/ni

      - name: install dependencies
        run: nci

      - name: lint
        run: nr lint

      - name: format check
        run: nr fmt --check
